{% load static %}
<!DOCTYPE html>

<html>
<head>
    <title>Real Estate</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
<style>
/* Navbar styling */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #333;
    padding: 0.5rem 1rem;
    backdrop-filter: blur(8px);
}

.nav-left a {
    margin-right: 1rem;
}

.nav-right a {
    margin-left: 1rem;
    padding: 8px 15px;
    border-radius: 5px;
    text-decoration: none;
    color: #333; 
    background-color: white; 
    font-weight: bold;
    transition: background 0.3s, color 0.3s;
}

.nav-right a:hover {
    background-color: #ddd; 
    color: #000; 
}
}
.navbar a {
    float: left;
    color: #f2f2f2;
    text-align: center;
    padding: 0.5rem 1rem;
    text-decoration: none;
    font-size: 1rem;
}

.navbar a:hover {
    background-color: #ddd;
    color: black;
}

.navbar .logo {
    font-weight: bold;
    font-size: 1.2rem;
}

/* Image */
.backgroundimage {
    position: relative;
    width: 100%;
    height: 60vh; 
    overflow: hidden;
}

.backgroundimage img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay text */
.backgroundimage-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    background: rgba(0, 0, 0, 0.4);
    padding: 20px;
    border-radius: 10px;
}

.backgroundimage-text h1 {
    font-size: 2.5rem;
}

.backgroundimage-text p {
    font-size: 1.2rem;
}

/* Filter Section */
.filter-section {
    width: 100%;
    padding: 40px 20px;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
}

.filter-section form {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.filter-section input {
    padding: 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    min-width: 180px;
}

.filter-section button {
    padding: 10px 20px;
    background: #333;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.filter-section button:hover {
    background: #555;
}

/*Footer*/
.footer {
    background: #222;
    color: #fff;
    margin-top: 40px;
}

.footer-content {
    display: flex;
    justify-content: space-between;
    padding: 30px 20px;
    flex-wrap: wrap;
}

.footer-section {
    max-width: 300px;
}

.footer-section h3 {
    margin-bottom: 10px;
}

.footer-section p {
    margin: 5px 0;
    font-size: 14px;
}

.socials {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}

.socials img {
    width: 30px;
    height: 30px;
    transition: transform 0.2s;
}

.socials img:hover {
    transform: scale(1.2);
}

.footer-bottom {
    text-align: center;
    padding: 10px;
    background: #111;
    font-size: 13px;
}



</style>
</head>
<body>

<!-- Navbar -->

    <div class="navbar">
    <!-- Left side  -->
        <div class="nav-left">
            <a href="#" class="logo">YK Real Estate Management</a>
            <a href="{% url 'homepage' %}">Home</a>
            <a href="{% url 'properties' %}">Properties</a>
            <a href="{% url 'contactus' %}">Contact</a>
            <a href="#">About</a>
        </div>
    <!-- Right side -->
        <div class="nav-right">
            <a href="#"class="btn-login">Login</a>
            <a href="#"class="btn-register">Register</a>
        </div>
    </div>
<!-- Image -->

    <div class="backgroundimage">
        <img src="{% static 'images/background.jpg' %}" alt="Real Estate">

        <div class="backgroundimage-text">
            <h1>Find Your Dream Home</h1>
            <p>Best properties in Mauritius</p>
        </div>
    </div>

<!-- Filter Section -->
    <div class="filter-section">
        <form method="GET" action="">
            
            <input type="text" name="location" placeholder="Location">

            <input type="number" name="min_price" placeholder="Min Price">
            <input type="number" name="max_price" placeholder="Max Price">

            <input type="text" name="keywords" placeholder="Keywords (e.g. bedrooms, pool)">

            <button type="submit">Search</button>
        </form>
    </div>

<!--Footer-->
    <footer class="footer">
        <div class="footer-content">
            
            <div class="footer-section">
                <h3>Contact Us</h3>
                <p>Email: info@realestate.com</p>
                <p>Phone: +230 123 4567</p>
                <p>Location: Mauritius</p>
            </div>

            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="socials">
                    <a href="https://facebook.com" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
                    </a>
                    <a href="https://instagram.com" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram">
                    </a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Real Estate. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
