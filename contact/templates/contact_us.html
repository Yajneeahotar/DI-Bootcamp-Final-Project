{% load static %}
<!DOCTYPE html>

<html>
<head>
    <title>Contact US Form</title>
    <link rel="stylesheet" href="{% static 'css/contact_us.css' %}">
    <style>
        /*Footer*/
        .footer {
            background: #222;
            color: #fff;
            margin-top: 40px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            padding: 30px 20px;
            flex-wrap: wrap;
        }

        .footer-section {
            max-width: 300px;
        }

        .footer-section h3 {
            margin-bottom: 10px;
        }

        .footer-section p {
            margin: 5px 0;
            font-size: 14px;
        }

        .socials {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .socials img {
            width: 30px;
            height: 30px;
            transition: transform 0.2s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        .footer-bottom {
            text-align: center;
            padding: 10px;
            background: #111;
            font-size: 13px;
        }

        /* Navbar styling */
        .navbar {
            background-color: #333;
            overflow: hidden;
            padding: 0.5rem 1rem;
        }

        .navbar a {
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-size: 1rem;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .navbar .logo {
            font-weight: bold;
            font-size: 1.2rem;
        }

    </style>

</head>
<body>
<!-- Navbar -->
    <div class="navbar">
        <a href="#" class="logo">YK Real Estate Management</a>
        <a href="{% url 'homepage' %}">Home</a>
        <a href="#">Properties</a>
        <a href="{% url 'contactus' %}">Contact</a>
        <a href="#">About</a>
    </div>
    <div class="contact-container">
        <h2>Contact Us</h2>
        <form class="contact-form" action="#" method="post">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="Your Phone Number">
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
            </div>
            
            <button type="submit">Send Message</button>
        </form>
    </div>
<!--Footer-->
    <footer class="footer">
        <div class="footer-content">
            
            <div class="footer-section">
                <h3>Contact Us</h3>
                <p>Email: info@realestate.com</p>
                <p>Phone: +230 123 4567</p>
                <p>Location: Mauritius</p>
            </div>

            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="socials">
                    <a href="https://facebook.com" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
                    </a>
                    <a href="https://instagram.com" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram">
                    </a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Real Estate. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
